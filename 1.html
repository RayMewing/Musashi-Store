<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tester API Atlantic H2H</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #f4f4f5; 
            display: flex; 
            justify-content: center; 
            padding: 50px 20px; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px; 
        }
        h2 { margin-top: 0; color: #18181b; }
        .form-group { margin-bottom: 15px; }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 700; 
            font-size: 13px; 
            color: #3f3f46; 
            text-transform: uppercase;
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e4e4e7; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: #2563eb;
            outline: none;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 15px; 
            margin-top: 10px; 
            transition: background 0.2s;
        }
        button:hover { background: #1d4ed8; }
        .note { 
            font-size: 12px; 
            color: #71717a; 
            margin-top: 15px; 
            text-align: center; 
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ЁЯЪА Tester Atlantic H2H</h2>
        <p style="font-size: 14px; color: #52525b; margin-top: -10px; margin-bottom: 24px;">
            Test API Key lu langsung dari browser tanpa backend.
        </p>

        <form action="https://atlantich2h.com/layanan/price_list" method="POST" target="_blank">
            
            <div class="form-group">
                <label>API Key Atlantic</label>
                <input type="text" name="api_key" placeholder="Paste API Key lu di sini..." required>
            </div>

            <div class="form-group">
                <label>Tipe Layanan</label>
                <select name="type">
                    <option value="prabayar">Prabayar (Pulsa, Game, dll)</option>
                    <option value="pascabayar">Pascabayar (PLN, PDAM, dll)</option>
                </select>
            </div>

            <button type="submit">Cek API (Buka Tab Baru)</button>
            
        </form>

        <div class="note">
            тЪая╕П <b>Penting:</b> Hasil JSON akan dibuka di tab baru untuk menghindari blokir CORS bawaan browser.
        </div>
    </div>
</body>
</html>
